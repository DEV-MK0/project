<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Monitor</title>

  <link rel="icon" href="/static/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="/static/js/script.js" defer></script>
</head>

<body>

  <div class="container">

    <header>
      <h1>Temperature Monitor</h1>
      <p>Live Temperature, Humidity und SQL Console</p>
    </header>

    <section class="card">
      <h2>Live Chart</h2>
        <div class="chart-container">
          <canvas id="liveChart"></canvas>
        </div>

        <div class="button-group">
        <label for="pointLimit">Limit:</label>
          <select id="pointLimit">
            <option value="10" selected>10</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div> 
    </section>

    <section class="card">
      <h2>Measurement Status</h2>

      <table>
        <thead>
          <tr>
            <th>Sensor</th>
            <th>Temp (°C)</th>
            <th>Humidity (%)</th>
            <th>Dew Point (°C)</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Inside</td>
            <td id="t1">-</td>
            <td id="h1">-</td>
            <td id="tp1">-</td>
          </tr>
          <tr>
            <td>Outside</td>
            <td id="t2">-</td>
            <td id="h2">-</td>
            <td id="tp2">-</td>
          </tr>
        </tbody>
      </table>

      <div class="status-grid">
        <div>
          <span>Delta Taupunkt</span>
          <strong id="delta_tp">- °C</strong>
        </div>
        <div>
          <span>Relay</span>
          <strong id="relay">-</strong>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Measurement Control</h2>

      <div class="control-row">
        <input type="number" id="measure_count" value="5" min="1">
        <button onclick="startMeasurements()">Start Measurements</button>

        <div class="progress-circle">
          <svg width="50" height="50">
            <circle class="bg" cx="25" cy="25" r="20"></circle>
            <circle class="progress" cx="25" cy="25" r="20"></circle>
          </svg>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>SQL Console</h2>

      <textarea id="sqlInput">SELECT * FROM measurements;</textarea>

      <div class="button-group">
        <button onclick="runSQL()">Run SQL</button>
        <button onclick="selectTable()">Select Table</button>
        <button onclick="resetTable()">Reset Table</button>
      </div>

      <div id="sqlTableContainer"></div>
      <pre id="sqlResult"></pre>
    </section>

  </div>

</body>
</html>
